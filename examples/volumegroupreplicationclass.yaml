# VolumeGroupReplicationClass defines the configuration for the mock storage operator
# This must be created BEFORE creating VolumeGroupReplication resources
---
apiVersion: replication.storage.openshift.io/v1alpha1
kind: VolumeGroupReplicationClass
metadata:
  annotations:
    replication.storage.openshift.io/is-default-class: "true"
  labels:
    ramendr.openshift.io/groupreplicationid: mock-storage-group-id
    ramendr.openshift.io/storageid: mock-storage-id
    ramendr.openshift.io/global: "true"
  name: mock-vgr-class
spec:
  # Provisioner name that the mock-storage-operator watches for
  provisioner: mock.storage.io
  
  parameters:
    # Default capacity for ReplicationDestinations
    capacity: "10Gi"
    
    # PSK secret name for rsync-tls authentication (optional)
    # If not specified, defaults to "volsync-rsync-tls-<vgr-name>"
    # pskSecretName: "my-custom-secret"
    
    # ConfigMap name containing PVC configurations (required for secondary)
    # The ConfigMap should be in the same namespace as the VGR
    # See examples/pvc-configmap.yaml for the expected format
    pvcConfigMap: "pvc-config"

# Setup workflow:
# 1. Create PSK secret on both clusters (must exist before deployment):
#    kubectl create secret generic volsync-rsync-tls-secret \
#      --from-literal=psk.txt="$(openssl rand -base64 48)" \
#      -n <namespace>
#
# 2. Create PVC ConfigMap on secondary cluster (see examples/pvc-configmap.yaml):
#    kubectl apply -f examples/pvc-configmap.yaml
#
# 3. Create this VGRClass on both clusters
#
# 4. Deploy secondary VGR (creates ReplicationDestinations with ServiceExport)
#
# 5. Deploy primary VGR (creates ReplicationSources that connect via Submariner)
#
# Note: With Submariner, no manual address configuration needed!
# Services are automatically discovered via clusterset.local domain

